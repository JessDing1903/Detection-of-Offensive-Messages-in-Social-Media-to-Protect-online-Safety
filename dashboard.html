<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offensive Message Detector</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1d27, #252836);
    border-bottom: 2px solid #3b82f6;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 1.4rem; color: #fff; }
  header .badge {
    background: #22c55e22;
    border: 1px solid #22c55e;
    color: #22c55e;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  /* Stats bar */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: #1a1d27;
    border: 1px solid #2a2d3e;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .num { font-size: 2rem; font-weight: 700; }
  .stat-card .lbl { font-size: 0.75rem; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .stat-card.total .num { color: #60a5fa; }
  .stat-card.flagged .num { color: #f87171; }
  .stat-card.cleared .num { color: #4ade80; }
  .stat-card.high .num { color: #f87171; }
  .stat-card.medium .num { color: #fbbf24; }

  /* Input panel */
  .input-panel {
    background: #1a1d27;
    border: 1px solid #2a2d3e;
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 28px;
  }
  .input-panel h2 { font-size: 1rem; color: #a0a0b0; margin-bottom: 16px; }
  .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .input-row textarea {
    flex: 1;
    min-width: 260px;
    background: #0f1117;
    border: 1px solid #3a3d50;
    border-radius: 8px;
    color: #e0e0e0;
    padding: 12px;
    font-size: 0.95rem;
    resize: vertical;
    min-height: 56px;
    outline: none;
    transition: border-color .2s;
  }
  .input-row textarea:focus { border-color: #3b82f6; }
  .side-fields { display: flex; flex-direction: column; gap: 8px; min-width: 160px; }
  .side-fields input, .side-fields select {
    background: #0f1117;
    border: 1px solid #3a3d50;
    border-radius: 8px;
    color: #e0e0e0;
    padding: 9px 12px;
    font-size: 0.88rem;
    outline: none;
  }
  .side-fields input:focus, .side-fields select:focus { border-color: #3b82f6; }
  #analyzeBtn {
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 26px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    min-width: 110px;
    transition: background .2s;
  }
  #analyzeBtn:hover { background: #2563eb; }
  #analyzeBtn:disabled { background: #374151; cursor: not-allowed; }

  /* Toast */
  #toast {
    display: none;
    position: fixed;
    top: 20px; right: 20px;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 999;
    animation: fadeIn .3s;
  }
  #toast.offensive { background: #7f1d1d; border: 1px solid #f87171; color: #fca5a5; }
  #toast.normal    { background: #14532d; border: 1px solid #4ade80; color: #86efac; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* Results table */
  .results-panel {
    background: #1a1d27;
    border: 1px solid #2a2d3e;
    border-radius: 12px;
    overflow: hidden;
  }
  .results-panel h2 {
    font-size: 1rem;
    color: #a0a0b0;
    padding: 16px 22px;
    border-bottom: 1px solid #2a2d3e;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .results-panel h2 button {
    background: #252836;
    border: 1px solid #3a3d50;
    color: #888;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .results-panel h2 button:hover { border-color: #f87171; color: #f87171; }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 10px 16px;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #555;
    background: #13151f;
    border-bottom: 1px solid #2a2d3e;
  }
  td { padding: 12px 16px; font-size: 0.88rem; border-bottom: 1px solid #1e2130; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr { transition: background .15s; }
  tr:hover td { background: #1e2233; }

  .badge-offensive {
    background: #7f1d1d44;
    border: 1px solid #f87171;
    color: #f87171;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .badge-normal {
    background: #14532d44;
    border: 1px solid #4ade80;
    color: #4ade80;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .sev-high   { color: #f87171; font-weight: 700; }
  .sev-medium { color: #fbbf24; font-weight: 700; }
  .sev-low    { color: #60a5fa; font-weight: 700; }
  .sev-none   { color: #4ade80; }

  .conf-bar-wrap { width: 80px; background: #0f1117; border-radius: 4px; height: 6px; display: inline-block; vertical-align: middle; margin-right: 6px; }
  .conf-bar { height: 6px; border-radius: 4px; }

  .text-cell { max-width: 340px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #emptyState { text-align: center; padding: 48px; color: #444; }
  #emptyState .icon { font-size: 2.5rem; margin-bottom: 10px; }

  .loader {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #3b82f6;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { text-align: center; color: #333; font-size: 0.78rem; padding: 24px; }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  <h1>Offensive Message Detector</h1>
  <span class="badge" id="svcStatus">● LIVE</span>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card total">
      <div class="num" id="s-total">0</div>
      <div class="lbl">Total Analyzed</div>
    </div>
    <div class="stat-card flagged">
      <div class="num" id="s-off">0</div>
      <div class="lbl">Flagged</div>
    </div>
    <div class="stat-card cleared">
      <div class="num" id="s-norm">0</div>
      <div class="lbl">Cleared</div>
    </div>
    <div class="stat-card high">
      <div class="num" id="s-high">0</div>
      <div class="lbl">High Severity</div>
    </div>
    <div class="stat-card medium">
      <div class="num" id="s-med">0</div>
      <div class="lbl">Medium Severity</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-panel">
    <h2>Submit a message for analysis</h2>
    <div class="input-row">
      <textarea id="msgText" placeholder="Type or paste a social media message here…" rows="2"></textarea>
      <div class="side-fields">
        <input id="msgAuthor" placeholder="Author / username" value="user123">
        <select id="msgPlatform">
          <option value="twitter">Twitter</option>
          <option value="facebook">Facebook</option>
          <option value="instagram">Instagram</option>
          <option value="youtube">YouTube</option>
          <option value="tiktok">TikTok</option>
        </select>
      </div>
      <button id="analyzeBtn" onclick="analyze()">Analyze</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results-panel">
    <h2>
      Results
      <button onclick="clearResults()">Clear all</button>
    </h2>
    <div id="tableWrap">
      <div id="emptyState">
        <div class="icon">🛡️</div>
        Submit a message above to see the analysis
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>
<footer>Java API · Python ML · MongoDB &nbsp;|&nbsp; Offensive Message Detection System</footer>

<script>
const API = 'http://localhost:8080/api';
let results = [];

async function analyze() {
  const text     = document.getElementById('msgText').value.trim();
  const author   = document.getElementById('msgAuthor').value.trim() || 'anonymous';
  const platform = document.getElementById('msgPlatform').value;

  if (!text) { alert('Please enter a message.'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span>Analyzing…';

  try {
    const res = await fetch(`${API}/messages/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, author, platform })
    });
    const data = await res.json();
    results.unshift(data);
    renderTable();
    showToast(data);
    loadStats();
    document.getElementById('msgText').value = '';
  } catch(e) {
    alert('Cannot reach the Java API at localhost:8080. Make sure the server is running.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Analyze';
  }
}

function renderTable() {
  if (!results.length) {
    document.getElementById('tableWrap').innerHTML =
      '<div id="emptyState"><div class="icon">🛡️</div>Submit a message above to see the analysis</div>';
    return;
  }
  let rows = results.map(r => {
    const conf    = Math.round((r.confidence || 0) * 100);
    const barCol  = r.offensive ? '#f87171' : '#4ade80';
    const sevCls  = `sev-${r.severity || 'none'}`;
    const labBadge = r.offensive
      ? '<span class="badge-offensive">🚨 OFFENSIVE</span>'
      : '<span class="badge-normal">✅ NORMAL</span>';
    return `<tr>
      <td>${labBadge}</td>
      <td class="text-cell" title="${esc(r.text)}">${esc(r.text)}</td>
      <td>${esc(r.platform||'')}</td>
      <td>${esc(r.author||'')}</td>
      <td>
        <span class="conf-bar-wrap"><span class="conf-bar" style="width:${conf}%;background:${barCol}"></span></span>
        ${conf}%
      </td>
      <td class="${sevCls}">${(r.severity||'none').toUpperCase()}</td>
      <td style="color:#555;font-size:.8rem">${new Date(r.createdAt).toLocaleTimeString()}</td>
    </tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Label</th><th>Message</th><th>Platform</th>
        <th>Author</th><th>Confidence</th><th>Severity</th><th>Time</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function loadStats() {
  try {
    const s = await fetch(`${API}/messages/stats`).then(r => r.json());
    document.getElementById('s-total').textContent = s.total || 0;
    document.getElementById('s-off').textContent   = s.offensive || 0;
    document.getElementById('s-norm').textContent  = s.normal || 0;
    document.getElementById('s-high').textContent  = (s.bySeverity||{}).high || 0;
    document.getElementById('s-med').textContent   = (s.bySeverity||{}).medium || 0;
  } catch(_) {}
}

function showToast(data) {
  const t = document.getElementById('toast');
  t.className = data.offensive ? 'offensive' : 'normal';
  t.textContent = data.offensive
    ? `🚨 FLAGGED — ${data.severity?.toUpperCase()} severity (${Math.round(data.confidence*100)}% confidence)`
    : `✅ CLEARED — Message appears normal (${Math.round(data.confidence*100)}% confidence)`;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

async function clearResults() {
  results = [];
  renderTable();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Allow Ctrl+Enter to submit
document.getElementById('msgText').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') analyze();
});

// Initial stats load
loadStats();
</script>
</body>
</html>
